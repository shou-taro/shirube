<svg width="96" height="96" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="shirube">
  <!-- A small ER-style node graph with one node highlighted — the "you are here"
       waypoint. Self-contained brand-lilac colours so it renders the same on any
       background (GitHub light or dark). -->
  <g stroke="#a78bfa" stroke-width="2" stroke-linecap="round">
    <line x1="12" y1="16" x2="31" y2="11.5" />
    <line x1="12" y1="16" x2="16" y2="35" />
    <line x1="32.5" y1="12.5" x2="36" y2="33" />
    <line x1="16" y1="35" x2="36" y2="33" />
    <circle cx="12" cy="16" r="4" fill="none" />
    <circle cx="16" cy="35" r="4" fill="none" />
    <circle cx="36" cy="33" r="4" fill="none" />
  </g>
  <circle cx="32" cy="11" r="5.5" fill="#a78bfa" />
</svg>
