version: 2
updates:
  # Python backend (uv / uv.lock).
  - package-ecosystem: "uv"
    directory: "/api"
    schedule:
      interval: "weekly"
    groups:
      backend:
        patterns: ["*"]

  # Frontend (pnpm / pnpm-lock.yaml).
  - package-ecosystem: "npm"
    directory: "/web"
    schedule:
      interval: "weekly"
    groups:
      frontend:
        patterns: ["*"]

  # GitHub Actions used by the workflows.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns: ["*"]
