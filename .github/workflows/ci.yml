name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: keep the default GITHUB_TOKEN read-only — the jobs only read the repo.
permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"
      - run: uv sync
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy -p shirube
      # Unit tests only here; the database-backed suite runs in the integration job.
      - run: uv run pytest -m "not integration"

  integration:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        # Wait for the database to accept connections before the tests start.
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"
      - run: uv sync
      - run: uv run pytest -m integration
        env:
          SHIRUBE_TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres

  # Supply-chain and static security checks. A vulnerable dependency or a flagged
  # code pattern fails CI — non-negotiable for a tool that handles database credentials.
  audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"
      - run: uv sync
      # SAST: flag insecure code patterns.
      - run: uv run bandit -r src -q
      # Dependency audit: fail on a known-vulnerable package.
      - run: uv run pip-audit

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run test
      - run: pnpm run build
      # Dependency audit: fail on a high-severity advisory in the JS dependencies.
      - run: pnpm audit --audit-level=high

  # The slowest, broadest layer: a couple of journeys through the whole stack (built SPA
  # served by the backend, against a seeded database). Its own job so its cost and any
  # flakiness stay out of the fast lint/test signal.
  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - run: uv sync
        working-directory: api
      # Builds the SPA (installing web deps) and bundles it into the API package.
      - run: ./scripts/build.sh
      - run: pnpm exec playwright install --with-deps chromium
        working-directory: web
      - run: pnpm run test:e2e
        working-directory: web
        env:
          CI: "true"
          SHIRUBE_E2E_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
      - uses: actions/upload-artifact@v7
        if: ${{ failure() }}
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7
